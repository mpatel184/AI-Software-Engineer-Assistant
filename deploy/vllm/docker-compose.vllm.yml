# vLLM inference backend for Qwen3-Coder-30B (production default).
#
# Usage (merged with the base compose):
#   docker compose -f docker-compose.yml -f deploy/vllm/docker-compose.vllm.yml up --build
#
# Requires an NVIDIA GPU + nvidia-container-toolkit on the host.
# The API/worker reach this service in-network at http://inference:8000/v1,
# so backend/.env should set:
#   LLM_BASE_URL=http://inference:8000/v1
#   LLM_STRUCTURED_MODE=guided_json
services:
  inference:
    image: vllm/vllm-openai:latest
    command: >
      --model Qwen/Qwen3-Coder-30B-A3B-Instruct
      --served-model-name Qwen3-Coder-30B-A3B-Instruct
      --max-model-len 131072
      --gpu-memory-utilization 0.92
      --quantization fp8
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    ports:
      - "8002:8000"   # host:container — internal port stays 8000 for the app
    volumes:
      - hfcache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health'); \" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 600s   # first run downloads weights

  api:
    depends_on:
      inference:
        condition: service_healthy

  worker:
    depends_on:
      inference:
        condition: service_healthy

volumes:
  hfcache:
